name: Recent Activity Workflow

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  update-readme:
    name: Update README with GitHub Activity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Settings to make it more visible
          MAX_LINES: 10
          # This ensures it looks for all types of activity, not just stars
          COMMIT_MESSAGE: "Updated recent activity"
          EMPTY_COMMIT_MESSAGE: "No recent activity found"
